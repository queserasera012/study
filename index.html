<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>まなびクエスト</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  font-family:'Zen Maru Gothic','Hiragino Maru Gothic ProN','BIZ UDGothic',sans-serif;
  min-height:100vh;color:var(--ink);background:var(--bg);
  transition:background .4s;
}
/* ---------- themes ---------- */
body[data-theme="adventure"]{
  --bg:#141B36;--bg2:#1D2950;--card:#22305F;--ink:#F2F5FF;--mut:#9BA6CF;
  --acc:#FFC94D;--acc2:#7BA5FF;--ok:#4ADE80;--ng:#FF7B7B;--line:#34417C;--btnink:#2A2000;
  --accD:#C99413;--gnd:#2F6B52;--gnd2:#255943;--scene:#1A2447;
  --sky1:#1B2452;--sky2:#2C3868;--sea:#1C3E6B;--seaW:#2E5A93;--mtn:#28345F;--mtn2:#35447A;
  --sand:#7A6A45;--lum:#FFF3C4;--starOp:1;--cloud:rgba(255,255,255,.16);--tree:#2C6349;--tree2:#3B8465;
  background-image:
    radial-gradient(1.5px 1.5px at 20% 30%,#fff8 0,transparent 100%),
    radial-gradient(1px 1px at 70% 15%,#fff6 0,transparent 100%),
    radial-gradient(1.5px 1.5px at 85% 55%,#fff7 0,transparent 100%),
    radial-gradient(1px 1px at 40% 75%,#fff5 0,transparent 100%),
    radial-gradient(2px 2px at 60% 40%,#ffd97a66 0,transparent 100%);
}
body[data-theme="pastel"]{
  --bg:#FFF3F7;--bg2:#FFE9F0;--card:#FFFFFF;--ink:#4A3B4E;--mut:#A98FA9;
  --acc:#FF8FB1;--acc2:#B79CFF;--ok:#2FBE8B;--ng:#F97B7B;--line:#F6D9E4;--btnink:#fff;
  --accD:#E56B94;--gnd:#C6A9E6;--gnd2:#B492DC;--scene:#FDF6FA;
  --sky1:#FFE4EF;--sky2:#FFF8FC;--sea:#BFE3F2;--seaW:#9CD1E8;--mtn:#E2C6EA;--mtn2:#CFAEDD;
  --sand:#FBE3C4;--lum:#FFD97A;--starOp:0;--cloud:#FFFFFF;--tree:#7FC8A0;--tree2:#5FB088;
  background-image:
    radial-gradient(3px 3px at 15% 20%,#FFD3E1 0,transparent 100%),
    radial-gradient(3px 3px at 80% 30%,#E4D6FF 0,transparent 100%),
    radial-gradient(3px 3px at 30% 80%,#FFE9C7 0,transparent 100%),
    radial-gradient(3px 3px at 90% 75%,#FFD3E1 0,transparent 100%);
}
.wrap{max-width:560px;margin:0 auto;padding:calc(16px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-right)) calc(48px + env(safe-area-inset-bottom)) calc(14px + env(safe-area-inset-left))}
.btn,.subj,.choice{touch-action:manipulation}
.mk{font-weight:900;font-size:1.1em}
/* ---------- きょうのクエスト カード ---------- */
.qcard{background:var(--card);border:2px solid var(--line);border-radius:22px;overflow:hidden;margin:14px 0;box-shadow:0 5px 0 rgba(0,0,0,.08)}
.qscene{position:relative;height:196px;background:radial-gradient(130px 96px at 68% 54%,rgba(255,201,77,.30),transparent 72%),var(--scene)}
.qstake{position:absolute;left:12px;top:12px;z-index:3;display:inline-flex;align-items:center;gap:5px;
  background:var(--card);border:2px solid var(--line);border-radius:999px;padding:4px 11px 4px 7px;font-weight:900;font-size:.85rem}
.qstake em{font-style:normal;color:var(--mut);font-size:.68rem}
.qbub{position:absolute;left:10px;top:58px;z-index:3;background:var(--card);border:2px solid var(--line);
  border-radius:14px 14px 14px 4px;padding:6px 11px;font-weight:700;font-size:.78rem;max-width:56%}
.qmoko{position:absolute;left:12px;bottom:32px;width:84px;height:84px;z-index:2;filter:drop-shadow(0 6px 5px rgba(0,0,0,.22))}
.qchest{position:absolute;right:14px;bottom:28px;width:160px;height:128px;z-index:2}
.qgnd{position:absolute;left:0;right:0;bottom:0;height:56px;z-index:1}
.qprev{display:flex;gap:6px;padding:12px 12px 0}
.qchip{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:var(--bg2);
  border:2px solid var(--line);border-radius:13px;padding:8px 4px}
.qchip.zero{opacity:.4}
.qchip b{font-weight:900;font-size:1.05rem;line-height:1}
.qchip span{font-size:.6rem;font-weight:700;color:var(--mut)}
.qcta{display:flex;align-items:center;justify-content:center;gap:9px;width:calc(100% - 24px);margin:12px;
  border:none;cursor:pointer;font-family:inherit;background:var(--acc);color:var(--btnink);
  font-weight:900;font-size:1.2rem;letter-spacing:.04em;padding:16px 12px 15px;border-radius:18px;
  box-shadow:0 7px 0 var(--accD),0 12px 18px rgba(0,0,0,.22);
  transition:transform .07s ease,box-shadow .07s ease;touch-action:manipulation}
.qcta:active{transform:translateY(6px);box-shadow:0 1px 0 var(--accD),0 4px 8px rgba(0,0,0,.2)}
.qcta:focus-visible{outline:4px solid var(--acc2);outline-offset:3px}
.qcta .rw{display:inline-flex;align-items:center;gap:3px;background:rgba(0,0,0,.14);border-radius:999px;padding:3px 9px 3px 5px;font-size:.85rem}
.qcta.ghost{background:var(--card);color:var(--mut);border:2px solid var(--line);box-shadow:0 5px 0 rgba(0,0,0,.1);font-size:1rem}
.qcta.ghost:active{transform:translateY(4px);box-shadow:0 1px 0 rgba(0,0,0,.1)}
.qsub{text-align:center;font-size:.72rem;color:var(--mut);font-weight:700;padding-bottom:14px;margin-top:-4px}
.qlid{transform-box:fill-box;transform-origin:50% 100%}
.qlid.open{transform:rotate(-52deg) translate(-6px,4px)}
@media (prefers-reduced-motion:no-preference){
  .qlid:not(.open){animation:qjig 1.9s ease-in-out infinite}
  .qcrack{animation:qglow 1.9s ease-in-out infinite}
  .qsp{animation:qtw 1.6s ease-in-out infinite}
  .qsp:nth-of-type(2){animation-delay:.5s}.qsp:nth-of-type(3){animation-delay:1s}
  .qmoko{animation:qbob 2.6s ease-in-out infinite}
  .qarm{animation:qwave 1.4s ease-in-out infinite;transform-box:fill-box;transform-origin:20% 90%}
  .qcta:not(.ghost){animation:qnudge 3.4s ease-in-out infinite}
}
@keyframes qjig{0%,72%,100%{transform:rotate(0)}80%{transform:rotate(-5deg)}88%{transform:rotate(2deg)}}
@keyframes qglow{0%,100%{opacity:.35}50%{opacity:1}}
@keyframes qtw{0%,100%{opacity:0;transform:scale(.5)}50%{opacity:1;transform:scale(1)}}
@keyframes qbob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes qwave{0%,100%{transform:rotate(0)}50%{transform:rotate(-18deg)}}
@keyframes qnudge{0%,92%,100%{transform:translateY(0)}95%{transform:translateY(-3px)}}
/* ---------- shared ---------- */
.card{background:var(--card);border:2px solid var(--line);border-radius:22px;padding:18px;margin-bottom:14px;box-shadow:0 4px 0 var(--line)}
.btn{
  display:inline-block;font-family:inherit;font-weight:900;font-size:1.05rem;
  background:var(--acc);color:var(--btnink);border:none;border-radius:999px;
  padding:14px 26px;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.25);
  transition:transform .06s;
}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.25)}
.btn.ghost{background:transparent;color:var(--ink);border:2px solid var(--line);box-shadow:none}
.btn.small{font-size:.85rem;padding:9px 16px}
.btn:focus-visible,.choice:focus-visible,button:focus-visible,input:focus-visible{outline:3px solid var(--acc2);outline-offset:2px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.sp{flex:1}
h1{font-size:1.5rem;font-weight:900;letter-spacing:.04em}
h2{font-size:1.1rem;font-weight:900;margin-bottom:10px}
.mut{color:var(--mut);font-size:.85rem}
.pill{display:inline-flex;align-items:center;gap:5px;background:var(--bg2);border:2px solid var(--line);border-radius:999px;padding:6px 13px;font-weight:700;font-size:.9rem}
/* ---------- header ---------- */
.top{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.avatar{font-size:2rem;background:var(--bg2);border:2px solid var(--line);border-radius:50%;width:56px;height:56px;display:flex;align-items:center;justify-content:center}
/* ---------- subject cards ---------- */
.subj{display:flex;align-items:center;gap:14px;width:100%;text-align:left;font-family:inherit;color:var(--ink);cursor:pointer;background:var(--card);border:2px solid var(--line);border-radius:22px;padding:18px;margin-bottom:12px;box-shadow:0 4px 0 var(--line);transition:transform .06s}
.subj:active{transform:translateY(3px);box-shadow:0 1px 0 var(--line)}
.subj .ic{display:block;flex:none}
.subj .nm{font-size:1.2rem;font-weight:900}
.lvbar{height:8px;background:var(--bg2);border-radius:99px;overflow:hidden;margin-top:6px;border:1px solid var(--line)}
.lvbar>i{display:block;height:100%;background:var(--acc);border-radius:99px}
/* ---------- quiz ---------- */
.prog{height:12px;background:var(--bg2);border:2px solid var(--line);border-radius:99px;overflow:hidden;flex:1}
.prog>i{display:block;height:100%;background:var(--acc);transition:width .3s;border-radius:99px}
.buddy{width:44px;height:44px;display:block;flex:none;transition:transform .2s}
.buddy svg{width:100%;height:100%;display:block}
.buddy.happy{animation:hop .5s}
.mokoBig{width:120px;height:120px;margin:0 auto 4px;display:block}
.welMoko{width:104px;height:104px;display:inline-block}
.mokoBig svg{width:100%;height:100%;display:block}
.subj .ic svg{width:44px;height:44px;display:block}
.chbadge.srcb{display:inline-flex;align-items:center;gap:6px}
.chbadge.srcb svg{width:18px;height:18px;flex:none}
.pill.ico{display:inline-flex;align-items:center;gap:4px}
.pill.ico svg{width:15px;height:15px;flex:none}
/* ---------- 週間ゴール ---------- */
.wkcard{background:var(--card);border:2px solid var(--line);border-radius:20px;padding:12px 14px 11px;margin:14px 0}
.wkhd{display:flex;align-items:center;font-size:.86rem}
.wkhd b{font-weight:900}
.wkn{font-weight:900;font-size:.8rem;color:var(--mut)}
.wkn.hit{color:var(--ok)}
.wkdots{display:flex;gap:6px;margin:10px 0 8px}
.wkd{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.wkd>span{font-size:.62rem;font-weight:700;color:var(--mut)}
.wkd>i{width:26px;height:26px;border-radius:50%;background:var(--bg2);border:2px solid var(--line);
 display:grid;place-items:center}
.wkd>i svg{width:13px;height:13px}
.wkd.on>i{background:var(--ok);border-color:var(--ok)}
.wkd.on>span{color:var(--ink)}
.wkft{display:flex;align-items:center;gap:4px;font-size:.7rem;color:var(--mut);font-weight:700}
.wkft svg{width:14px;height:14px;flex:none;vertical-align:-2px}
/* ---------- やりすぎ防止 ---------- */
.restc{display:flex;align-items:center;gap:12px;background:var(--bg2);border:2px dashed var(--line);
 border-radius:20px;padding:12px 14px;margin:14px 0}
.restc b{font-size:.9rem}
.restMoko{width:52px;height:52px;flex:none;display:block}
/* ---------- しまの道(ホーム) ---------- */
.isleHd{display:flex;align-items:center;gap:8px;margin:22px 2px 2px}
.isleHd b{font-size:.95rem;font-weight:900}
.isleHd .ln{flex:1;height:2px;background:var(--line);border-radius:2px}
.isle{position:relative;width:100%;max-width:360px;margin:0 auto}
/* --- 背景(空・雲・海・山・森) --- */
.isleBg{position:absolute;inset:0;overflow:hidden;border-radius:26px;z-index:0;
 border:2px solid var(--line);background:linear-gradient(180deg,var(--sky1),var(--sky2) 62%)}
.isleBg>*{position:absolute}
.bgStars{left:0;top:0;width:100%;height:96px;opacity:var(--starOp)}
.bgLum{right:16px;top:14px;width:56px;height:56px}
.bgCloud{fill:var(--cloud)}
.bgCloud.c1{left:-70px;top:16px;width:78px}
.bgCloud.c2{left:-90px;top:44px;width:56px}
.bgCloud.c3{left:-60px;top:64px;width:64px}
.bgMtn{left:0;top:30px;width:100%;height:62px}
.bgSea{left:0;top:88px;width:100%;height:46px;background:var(--sea);overflow:hidden}
.bgSea svg{position:absolute;left:0;top:0;width:200%;height:100%}
.bgSand{left:0;top:126px;width:100%;height:30px}
.bgLand{left:0;right:0;top:140px;bottom:0;background:linear-gradient(180deg,var(--gnd),var(--gnd2))}
.bgHill{left:0;top:140px;width:100%;height:56px}
.bgTree{width:38px;height:48px}
@media (prefers-reduced-motion:no-preference){
 .bgCloud.c1{animation:cdrift 42s linear infinite}
 .bgCloud.c2{animation:cdrift 64s linear infinite;animation-delay:-12s}
 .bgCloud.c3{animation:cdrift 54s linear infinite;animation-delay:-30s}
 .bgWave1{animation:wroll 14s linear infinite}
 .bgWave2{animation:wroll 22s linear infinite reverse}
 .bgLum{animation:lumpulse 6s ease-in-out infinite}
}
@keyframes cdrift{from{transform:translateX(0)}to{transform:translateX(460px)}}
@keyframes wroll{from{transform:translateX(0)}to{transform:translateX(-360px)}}
@keyframes lumpulse{0%,100%{opacity:.85}50%{opacity:1}}
.isle .trail{position:absolute;inset:0;width:100%;height:100%;overflow:visible;z-index:1}
.inode{position:absolute;transform:translate(-50%,-50%);width:80px;height:80px;z-index:2;
 border:none;background:none;padding:0;cursor:pointer;font-family:inherit;color:var(--ink);touch-action:manipulation}
.inode .ring{position:absolute;inset:0;border-radius:50%;background:var(--line);
 background:conic-gradient(var(--acc) calc(var(--p) * 1%), var(--line) 0)}
.inode .disc{position:absolute;inset:5px;border-radius:50%;background:var(--card);
 border:2px solid var(--card);display:grid;place-items:center;
 box-shadow:0 5px 0 rgba(0,0,0,.16),0 9px 16px rgba(0,0,0,.18);transition:transform .07s}
.inode:active .disc{transform:translateY(3px)}
.inode:focus-visible .ring{box-shadow:0 0 0 4px var(--acc2)}
.inode .disc svg{width:40px;height:40px;display:block}
.inode .lv{position:absolute;right:-4px;bottom:2px;background:var(--acc);color:var(--btnink);
 font-weight:900;font-size:.62rem;min-width:30px;padding:1px 5px;border-radius:999px;
 border:2px solid var(--card);z-index:3}
.inode .done{position:absolute;left:-4px;top:0;width:22px;height:22px;border-radius:50%;
 background:var(--ok);border:2px solid var(--card);display:grid;place-items:center;z-index:3}
.inode .done svg{width:12px;height:12px}
.inode .lbl{position:absolute;top:82px;left:50%;transform:translateX(-50%);white-space:nowrap;
 font-weight:900;font-size:.76rem;background:var(--card);border:2px solid var(--line);
 padding:2px 10px;border-radius:999px}
@keyframes hop{0%{transform:translateY(0)}35%{transform:translateY(-14px) rotate(-8deg)}70%{transform:translateY(0)}85%{transform:translateY(-5px)}100%{transform:translateY(0)}}
@media (prefers-reduced-motion:reduce){.buddy.happy{animation:none}.btn,.subj,.choice{transition:none}}
.bigq{font-size:3.4rem;font-weight:900;text-align:center;margin:10px 0;line-height:1.25;word-break:keep-all}
.bigq.emoji{font-size:3rem;letter-spacing:.1em}
.qtext{text-align:center;font-size:1.1rem;font-weight:700;margin-bottom:14px}
.choice{display:block;width:100%;font-family:inherit;font-size:1.15rem;font-weight:700;color:var(--ink);background:var(--bg2);border:2px solid var(--line);border-radius:18px;padding:15px 16px;margin-bottom:10px;cursor:pointer;text-align:center;box-shadow:0 3px 0 var(--line);transition:transform .06s}
.choice:active{transform:translateY(2px)}
.choice.ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.choice.ng{background:var(--ng);color:#fff;border-color:var(--ng)}
.choice.dim{opacity:.45}
.inp{width:100%;font-family:inherit;font-size:1.4rem;font-weight:700;text-align:center;padding:14px;border-radius:16px;border:2px solid var(--line);background:var(--bg2);color:var(--ink)}
.banner{border-radius:18px;padding:14px 16px;font-weight:900;font-size:1.15rem;margin:12px 0;color:#fff;text-align:center}
.banner.ok{background:var(--ok)}
.banner.ng{background:var(--ng)}
.expl{background:var(--bg2);border:2px dashed var(--line);border-radius:16px;padding:12px 14px;font-size:.95rem;margin-bottom:12px}
.chbadge{display:inline-block;background:var(--acc2);color:#fff;border-radius:99px;padding:4px 12px;font-size:.8rem;font-weight:900;margin-bottom:6px}
/* ---------- result ---------- */
.stars{font-size:2.6rem;text-align:center;letter-spacing:.15em;margin:8px 0}
.bignum{font-size:2.2rem;font-weight:900;text-align:center}
/* ---------- collection ---------- */
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.gitem{background:var(--bg2);border:2px solid var(--line);border-radius:16px;padding:10px 4px;text-align:center}
.gitem .e{font-size:1.9rem}
.gitem .n{font-size:.65rem;font-weight:700;margin-top:3px}
.gitem.lock{opacity:.4}
.rar{font-size:.6rem;font-weight:900;color:var(--acc)}
/* ---------- parent ---------- */
table{width:100%;border-collapse:collapse;font-size:.85rem}
td,th{padding:7px 6px;border-bottom:1px solid var(--line);text-align:left}
.chart{display:flex;align-items:flex-end;gap:6px;height:90px;margin-top:8px}
.chart .col{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:3px}
.chart .bar{width:100%;background:var(--bg2);border-radius:6px 6px 0 0;position:relative;overflow:hidden;border:1px solid var(--line)}
.chart .bar>i{position:absolute;bottom:0;left:0;width:100%;background:var(--ok)}
.chart .dl{font-size:.6rem;color:var(--mut)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:20px;z-index:10}
.modal .card{max-width:340px;width:100%;text-align:center;animation:pop .25s}
@keyframes pop{0%{transform:scale(.7);opacity:0}100%{transform:scale(1);opacity:1}}
.gbig{font-size:4.5rem;margin:8px 0}
label{font-weight:700;font-size:.9rem;display:block;margin:10px 0 4px}
select,input[type=text],input[type=password],input[type=tel]{font-family:inherit;font-size:1rem;padding:10px 12px;border-radius:12px;border:2px solid var(--line);background:var(--bg2);color:var(--ink);width:100%}
.profcard{text-align:center;padding:26px 18px}
.profcard .e{font-size:3.4rem}
</style>

<body data-theme="adventure">
<div id="app" class="wrap"></div>
<script>
/* ================= sound ================= */
let actx=null;
function ac(){ if(!actx){ const A=window.AudioContext||window.webkitAudioContext; actx=new A(); } if(actx.state==='suspended')actx.resume(); return actx; }
function tone(f,delay,dur,type,vol){
  if(!S||!S.sound)return;
  try{
    const c=ac(),o=c.createOscillator(),g=c.createGain(),t=c.currentTime+delay;
    o.type=type||'sine';o.frequency.setValueAtTime(f,t);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.linearRampToValueAtTime(vol||0.14,t+0.015);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+dur+0.05);
  }catch(e){}
}
const SFX={
  click(){tone(660,0,0.07,'triangle',0.08);},
  ok(){tone(523,0,0.12,'sine');tone(659,0.09,0.12,'sine');tone(784,0.18,0.2,'sine');},
  ng(){tone(233,0,0.18,'triangle',0.1);tone(196,0.12,0.25,'triangle',0.1);},
  coin(){tone(988,0,0.08,'square',0.06);tone(1319,0.07,0.16,'square',0.06);},
  fanfare(){[523,659,784,1047].forEach((f,i)=>tone(f,i*0.11,0.22,'sine'));tone(1319,0.5,0.4,'sine');},
  lvup(){[392,523,659,784,1047,1319].forEach((f,i)=>tone(f,i*0.09,0.2,'sine'));},
  gacha(){for(let i=0;i<8;i++)tone(400+i*130,i*0.05,0.09,'triangle',0.07);tone(1568,0.45,0.35,'sine');}
};
/* ================= speech (Web Speech API) ================= */
let jaVoice=null,enVoice=null,voicesReady=false;
function loadVoices(){
 try{
  const vs=speechSynthesis.getVoices();if(!vs||!vs.length)return;
  jaVoice=vs.find(v=>/ja[-_]?JP/i.test(v.lang))||vs.find(v=>/Kyoko|O-ren|ja/i.test(v.name))||null;
  enVoice=vs.find(v=>/en[-_]?US/i.test(v.lang))||vs.find(v=>/en/i.test(v.lang))||null;
  voicesReady=true;
 }catch(e){}
}
if(typeof speechSynthesis!=='undefined'){loadVoices();try{speechSynthesis.onvoiceschanged=loadVoices;}catch(e){}}
function speak(text,lang){
 try{
  if(typeof speechSynthesis==='undefined')return;
  if(!voicesReady)loadVoices();
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);

/* ---- migrate chain: v1/v2(固定p1/p2) → v3(UUID+order) ---- */
function migrate(){
 if(!S.profiles)S.profiles={};
 // v1/v2 形式(p1/p2固定キー)を UUID + order へ移行(履歴・コイン・図鑑を保持)
 if(!S.order){
  const order=[];const np={};
  for(const oldKey of Object.keys(S.profiles)){
   const id=uuid();np[id]=S.profiles[oldKey];order.push(id);
   if(S.active===oldKey)S.active=id;
  }
  S.profiles=np;S.order=order;
 }
 if(S.pin===undefined)S.pin='1234';
 if(S.sound===undefined)S.sound=true;
 if(S.appLock===undefined)S.appLock=null;
 if(!S.family)S.family={name:'',flower:0};
 if(S.lastSeen===undefined)S.lastSeen='';
 // 各プロファイルに不足フィールドを補完(後方互換)
 for(const id of S.order){
  const p=S.profiles[id];if(!p)continue;
  const dfl=newProfile();
  for(const k of ['coins','xp','streak','lastPlayed','sessionLen','autoRead','charms'])
   if(p[k]===undefined)p[k]=dfl[k];
  if(p.weekClaim===undefined)p.weekClaim='';
  for(const k of ['collection','log','reports','inbox'])if(!p[k])p[k]=dfl[k];
  if(p.lock===undefined)p.lock=null;
  if(!p.grade)p.grade='g34';
  if(!p.theme)p.theme='adventure';
  if(!p.created)p.created=today();
  if(p.lastBackup===undefined)p.lastBackup='';
  if(!p.subjects)p.subjects={};
  for(const sk in p.subjects){
   const sb=p.subjects[sk];
   if(!sb.recent)sb.recent=[];
   if(!sb.miss)sb.miss={};
   if(!sb.items)sb.items={};
   if(sb.placement===undefined)sb.placement=false; // 既存ユーザーは実力が既に反映済みとみなす
  }
 }
 S.version=SCHEMA_VERSION;
}

const Storage={
 mode:(typeof window!=='undefined'&&window.storage)?'claude':'local',
 async get(key){
  try{
   if(this.mode==='claude'){const r=await window.storage.get(key);return r?r.value:null;}
   return localStorage.getItem(key);
  }catch(e){return null;}
 },
 async set(key,val){
  try{
   if(this.mode==='claude'){await window.storage.set(key,val);return;}
   localStorage.setItem(key,val);
  }catch(e){console.error('storage set failed',e);}
 }
};

const R=n=>Math.floor(Math.random()*n);
function shuf(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=R(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}
function pickN(a,n){return shuf(a).slice(0,n);}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function ymd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
/* 「1日」の境界を朝4時とする(夜プレイでストリークが切れないように) */
function today(){return ymd(new Date(Date.now()-4*36e5));}
function daysAgo(n){return ymd(new Date(Date.now()-4*36e5-n*864e5));}
function dateAdd(s,n){const p=s.split('-');const d=new Date(+p[0],+p[1]-1,+p[2]);d.setDate(d.getDate()+n);return ymd(d);}
function dateDiff(a,b){const pa=a.split('-'),pb=b.split('-');return Math.round((new Date(+pa[0],+pa[1]-1,+pa[2])-new Date(+pb[0],+pb[1]-1,+pb[2]))/864e5);}
function toHira(s){return s.replace(/[\u30a1-\u30f6]/g,c=>String.fromCharCode(c.charCodeAt(0)-0x60));}
function toHalf(s){return s.replace(/[０-９．]/g,c=>c==='．'?'.':String.fromCharCode(c.charCodeAt(0)-0xFEE0));}
function mkChoice(correct,wrongs,text,big,key,x,extra){
 const arr=shuf([{t:correct,ok:1}].concat(wrongs.map(w=>({t:w,ok:0}))));
 return Object.assign({type:'choice',big:big,text:text,choices:arr.map(o=>o.t),a:arr.findIndex(o=>o.ok),x:x,key:key},extra||{});
}

/* ---- P1-1 きょうのミッション: 復習(SRS due)40% / 弱点30% / 新規 で自動編成 ---- */
function dueItemsOf(p){
 const t=today(),out=[];
 for(const sk in p.subjects){const items=p.subjects[sk].items||{};
  for(const key in items){const it=items[key];if(it.due&&dateDiff(it.due,t)<=0)out.push({subject:sk,key:key,st:it.st||0});}}
 return out;
}
function weakItemsOf(p){
 const out=[];
 for(const sk in p.subjects){const miss=p.subjects[sk].miss||{};
  for(const key in miss){if(miss[key]>=2)out.push({subject:sk,key:key,n:miss[key]});}}
 return out.sort((a,b)=>b.n-a.n);
}
/* keyを実際の問題に。rikaは同一問を再現、生成教科は同教科・同レベルで新規生成(近似復習)。 */
function questionFor(p,subject,key,src){
 let q=null;
 if(subject==='rika'){const it=RIKA.find(r=>r.id===key);if(it)q=mkChoice(it.c[0],it.c.slice(1),it.q,it.b,it.id,it.x);}
 if(!q)q=genQ(subject,p.subjects[subject].level);
 q.subj=subject;q.src=src;return q;
}
/* ミッションの内訳は必ずここから導く(表示と出題の食い違いを防ぐ単一の真実) */
function missionSlots(p){
 const len=Math.min(10,(p.sessionLen||8)+2);
 const due=dueItemsOf(p);
 const inDue={};due.forEach(d=>{inDue[d.subject+'|'+d.key]=1;});
 // 復習に入る問題は弱点枠から除外(同じ問題が二重に数えられるのを防ぐ)
 const weak=weakItemsOf(p).filter(w=>!inDue[w.subject+'|'+w.key]);
 const nReview=Math.min(Math.round(len*0.4),due.length);
 const nWeak=Math.min(Math.round(len*0.3),weak.length);
 const nNew=Math.max(0,len-nReview-nWeak);
 return {len,due,weak,nReview,nWeak,nNew,mins:Math.max(3,Math.round(len*0.55))};
}
function buildMission(p){
 const s=missionSlots(p);
 const due=shuf(s.due.slice()), weak=shuf(s.weak.slice());
 const subs=Object.keys(p.subjects);
 const qs=[],used={};
 const add=(q)=>{const sig=(q.subj||'')+'|'+q.key+'|'+(q.big||'')+'|'+q.text;if(used[sig])return false;used[sig]=1;qs.push(q);return true;};
 // 生成教科は乱数なので、重複したら数回引き直す(枠を落とさない)
 const fill=(list,n,src)=>{let got=0;
  for(let i=0;i<list.length&&got<n;i++){
   for(let t=0;t<6;t++){if(add(questionFor(p,list[i].subject,list[i].key,src))){got++;break;}}
  }
  return got;};
 fill(due,s.nReview,'review');
 fill(weak,s.nWeak,'weak');
 let guard=0,ri=R(subs.length);
 while(qs.length<s.len&&guard++<300){const sk=subs[(ri++)%subs.length];const q=genQ(sk,p.subjects[sk].level);q.subj=sk;q.src='new';add(q);}
 return shuf(qs);
}

function handleAns(ok){

 const isRetry=!!q.retry;
 if(ok){quiz.correct++;if(!isRetry)quiz.coins+=q.ch?2:1;else quiz.coins+=0;p.xp+=isRetry?0:2;SFX.ok();}
 else SFX.ng();
 // とき直し(再出題)分は習熟判定・履歴から除外
 if(!q.ch&&!isRetry){
  const sb=p.subjects[sk];
  // recent(=レベル判定の窓)は単一教科セッションのみ。ミッションは記録するがレベルは動かさない
  if(!quiz.mission){sb.recent.push(ok?1:0);const win=(sb.placement?4:8);if(sb.recent.length>win)sb.recent.shift();}
  if(!ok)sb.miss[q.key]=(sb.miss[q.key]||0)+1;
  else if(sb.miss[q.key]){sb.miss[q.key]--;if(sb.miss[q.key]<=0)delete sb.miss[q.key];} // 正解で弱点を1つ回復
  // 問題単位の履歴 + SRS
  const it=sb.items[q.key]||(sb.items[q.key]={s:0,c:0,st:0,last:'',due:null,ms:[]});
  it.s++;if(ok)it.c++;
  it.last=today();
  if(ok){it.st=(it.st||0)+1;it.due=dateAdd(today(),srsInterval(it.st));}
  else{it.st=0;it.due=dateAdd(today(),1);}
  if(rt){it.ms.push(rt);if(it.ms.length>5)it.ms.shift();}
  // 誤答はこのセッション末尾に1回だけ再出題(とき直しキュー)
  if(!ok&&!quiz.qs.slice(quiz.idx+1).some(x=>x.key===q.key&&x.retry)){
   const rq=Object.assign({},q,{retry:true});
   if(rq.type==='choice'){const arr=shuf(rq.choices.map((t,i)=>({t,ok:i===rq.a})));rq.choices=arr.map(o=>o.t);rq.a=arr.findIndex(o=>o.ok);}
   quiz.qs.push(rq);
  }
 }
 const t=today();
 if(!p.log[t])p.log[t]={a:0,c:0,s:{}};
 const L=p.log[t];L.a++;if(ok)L.c++;
 if(!L.s[sk])L.s[sk]={a:0,c:0};
 L.s[sk].a++;if(ok)L.s[sk].c++;
 if(S.family)S.family.flower=(S.family.flower||0)+(ok?1:0);
 save();render();
 const bd=document.getElementById('buddy');
 if(bd&&ok){bd.classList.add('happy');}
}

 }
 const t=today();
 // --- 1日のコイン上限(遊ぶこと自体は止めない。コインだけ止まる) ---
 const L=p.log[t]||(p.log[t]={a:0,c:0,s:{}});
 const room=Math.max(0,COIN_CAP-(L.k||0));
 let gain=quiz.coins;
 if(gain>room){gain=room;quiz.capped=true;}
 L.k=(L.k||0)+gain;
 p.coins+=gain;
 quiz.gained=gain;
 // --- ストリーク(おまもりで1〜2日の抜けを守る) ---
 if(p.lastPlayed!==t){
  if(clockSafe){
   const gap=p.lastPlayed?dateDiff(t,p.lastPlayed):999;
   if(gap===1)p.streak=(p.streak||0)+1;
   else if(gap>1&&gap<=3&&(p.charms||0)>=gap-1){
    p.charms-=(gap-1);p.streak=(p.streak||0)+1;quiz.charmUsed=gap-1;
   }
   else p.streak=1;
  }
  p.lastPlayed=t;
 }
 // --- 週間ゴール(達成は週1回だけ。ごほうびは上限の対象外) ---
 const wk=weekKey(t);
 if(p.weekClaim!==wk&&weekDone(p)>=WEEK_GOAL){
  p.weekClaim=wk;
  p.coins+=WEEK_REWARD;
  p.charms=Math.min(CHARM_MAX,(p.charms||0)+1);
  quiz.weekBonus=true;
 }
 pruneLogs(p);
 if(!quiz.lvMsg)SFX.fanfare();
 save();
 V.screen='result';render();
}
/* P3: 90日超の日次ログを月次に集約 */
function pruneLogs(p){
 const cut=daysAgo(90);
 if(!p.logM)p.logM={};
 for(const k of Object.keys(p.log)){
  if(dateDiff(k,cut)<0){
   const mo=k.slice(0,7),L=p.log[k];
   const M=p.logM[mo]||(p.logM[mo]={a:0,c:0});
   M.a+=L.a||0;M.c+=L.c||0;
   delete p.log[k];
  }
 }
}

function validImport(o){
 if(!o||typeof o!=='object')return 'データの形式が正しくありません';
 if(typeof o.version!=='number'||o.version>SCHEMA_VERSION+1)return 'バージョンが対応していません';
 if(!o.profiles||typeof o.profiles!=='object')return 'プロファイル情報がありません';
 const keys=Object.keys(o.profiles);
 if(keys.length===0||keys.length>12)return 'プロファイル数が不正です';
 for(const k of keys){const p=o.profiles[k];if(!p||typeof p!=='object'||typeof p.name!=='string'||p.name.length>40||!p.subjects)return 'プロファイルの中身が不正です';}
 return null;
}
function doImport(){
 const t=document.getElementById('impTa');if(!t)return;
 let o;
 try{o=JSON.parse(t.value.trim());}catch(e){V.ieOk=false;V.ieMsg='読み込めませんでした(文字が正しくありません)';render();return;}
 const err=validImport(o);
 if(err){V.ieOk=false;V.ieMsg='読み込めませんでした('+err+')';render();return;}
 // 既存データを控えに退避してから置換
 try{Storage.set('manabiquest-backup',JSON.stringify(S));}catch(e){}
 S=o;migrate();
 V.pid=null;V.demo=false;S.active=null;V.unlocked=true;
 save();SFX.fanfare();V.ieOk=true;V.ieMsg='読み込みました!';V.screen='profiles';render();
}

function demoState(){
 const dd={version:SCHEMA_VERSION,pin:'1234',sound:S.sound,active:null,appLock:null,family:{name:'サンプル',flower:120},lastSeen:today(),profiles:{},order:[]};
 const demo=[['たろう','🦖','adventure','g34',{kanji:4,math:5,eigo:2,rika:2}],['はなこ','🐰','pastel','kinder',{hira:3,kazu:2,eigo:2,chie:2}]];
 demo.forEach((dp,n)=>{
  const id='demo'+n;const p=newProfile(dp[0],dp[1],dp[2],dp[3]);p.placement=false;
  for(const sk in dp[4]){if(p.subjects[sk]){p.subjects[sk].level=dp[4][sk];p.subjects[sk].placement=false;}}
  p.coins=45+n*20;p.streak=6+n;p.lastPlayed=today();
  for(let i=0;i<7;i++){const day=daysAgo(i);p.log[day]={a:8+R(10),c:6+R(6),s:{}};}
  const gk=Object.keys(p.subjects);gk.forEach((sk,j)=>{if(j<3)p.subjects[sk].miss={sample:1+R(3)};});
  // collection sample
  GACHA.slice(0,8+n*2).forEach(g=>p.collection[g.e]=1);
  dd.profiles[id]=p;dd.order.push(id);
 });
 return dd;
}
function toggleDemo(){
 if(V.demo){S=V.realS;V.realS=null;V.demo=false;V.pid=null;V.unlocked=true;SFX.click();V.screen='profiles';render();}
 else{V.realS=S;S=demoState();V.demo=true;V.pid=null;SFX.click();V.screen='profiles';render();}
}

/* ================= init ================= */
(async()=>{
 await load();
 V.unlocked=!S.appLock;
 if(!S.order.length)V.screen='welcome';
 else if(S.active&&S.profiles[S.active]&&V.unlocked){V.pid=S.active;V.screen='home';}
 else V.screen=V.unlocked?'profiles':'gate';
 render();
})();
</script>
