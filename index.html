<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>まなびクエスト</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  font-family:'Zen Maru Gothic','Hiragino Maru Gothic ProN','BIZ UDGothic',sans-serif;
  min-height:100vh;color:var(--ink);background:var(--bg);
  transition:background .4s;
}
/* ---------- themes ---------- */
body[data-theme="adventure"]{
  --bg:#141B36;--bg2:#1D2950;--card:#22305F;--ink:#F2F5FF;--mut:#9BA6CF;
  --acc:#FFC94D;--acc2:#7BA5FF;--ok:#4ADE80;--ng:#FF7B7B;--line:#34417C;--btnink:#2A2000;
  --accD:#C99413;--gnd:#2F6B52;--gnd2:#255943;--scene:#1A2447;
  --sky1:#1B2452;--sky2:#2C3868;--sea:#1C3E6B;--seaW:#2E5A93;--mtn:#28345F;--mtn2:#35447A;
  --sand:#7A6A45;--lum:#FFF3C4;--starOp:1;--cloud:rgba(255,255,255,.16);--tree:#2C6349;--tree2:#3B8465;
  background-image:
    radial-gradient(1.5px 1.5px at 20% 30%,#fff8 0,transparent 100%),
    radial-gradient(1px 1px at 70% 15%,#fff6 0,transparent 100%),
    radial-gradient(1.5px 1.5px at 85% 55%,#fff7 0,transparent 100%),
    radial-gradient(1px 1px at 40% 75%,#fff5 0,transparent 100%),
    radial-gradient(2px 2px at 60% 40%,#ffd97a66 0,transparent 100%);
}
body[data-theme="pastel"]{
  --bg:#FFF3F7;--bg2:#FFE9F0;--card:#FFFFFF;--ink:#4A3B4E;--mut:#A98FA9;
  --acc:#FF8FB1;--acc2:#B79CFF;--ok:#2FBE8B;--ng:#F97B7B;--line:#F6D9E4;--btnink:#fff;
  --accD:#E56B94;--gnd:#C6A9E6;--gnd2:#B492DC;--scene:#FDF6FA;
  --sky1:#FFE4EF;--sky2:#FFF8FC;--sea:#BFE3F2;--seaW:#9CD1E8;--mtn:#E2C6EA;--mtn2:#CFAEDD;
  --sand:#FBE3C4;--lum:#FFD97A;--starOp:0;--cloud:#FFFFFF;--tree:#7FC8A0;--tree2:#5FB088;
  background-image:
    radial-gradient(3px 3px at 15% 20%,#FFD3E1 0,transparent 100%),
    radial-gradient(3px 3px at 80% 30%,#E4D6FF 0,transparent 100%),
    radial-gradient(3px 3px at 30% 80%,#FFE9C7 0,transparent 100%),
    radial-gradient(3px 3px at 90% 75%,#FFD3E1 0,transparent 100%);
}
body[data-theme="forest"]{
  --bg:#EDF6EA;--bg2:#DFEEDC;--card:#FFFFFF;--ink:#2B4030;--mut:#6E8873;
  --acc:#FFB84D;--acc2:#4FA96B;--ok:#2E9E6B;--ng:#E4694F;--line:#CDE2CC;--btnink:#3B2A00;
  --accD:#E09A2F;--gnd:#6FBE7E;--gnd2:#57A968;--scene:#F2FBF0;
  --sky1:#D8F0E0;--sky2:#F2FBF0;--sea:#8FD0C0;--seaW:#6FBFAE;--mtn:#7FBF95;--mtn2:#9AD0AC;
  --sand:#EBD9A8;--lum:#FFD97A;--starOp:0;--cloud:#FFFFFF;--tree:#3E8E5A;--tree2:#5CAE78;
  background-image:
    radial-gradient(3px 3px at 18% 22%,#BEE3C4 0,transparent 100%),
    radial-gradient(3px 3px at 78% 32%,#D8EFC9 0,transparent 100%),
    radial-gradient(3px 3px at 32% 78%,#CBE8CF 0,transparent 100%),
    radial-gradient(3px 3px at 88% 72%,#BEE3C4 0,transparent 100%);
}
body[data-theme="ocean"]{
  --bg:#EAF6FB;--bg2:#DCEFF8;--card:#FFFFFF;--ink:#1E3A4C;--mut:#5F8296;
  --acc:#FFC24D;--acc2:#2E9BC6;--ok:#2E9E6B;--ng:#F2705C;--line:#C8E3F0;--btnink:#3B2A00;
  --accD:#E5A62B;--gnd:#E8D296;--gnd2:#D9C07E;--scene:#F2FAFF;
  --sky1:#BEE7F7;--sky2:#EAF9FF;--sea:#3FA9DA;--seaW:#6FC4E8;--mtn:#79B8D2;--mtn2:#95CCE2;
  --sand:#F7E2B0;--lum:#FFD34D;--starOp:0;--cloud:#FFFFFF;--tree:#2FA57B;--tree2:#4FC094;
  background-image:
    radial-gradient(3px 3px at 20% 25%,#BFE6F5 0,transparent 100%),
    radial-gradient(3px 3px at 75% 20%,#D2F0FA 0,transparent 100%),
    radial-gradient(3px 3px at 35% 80%,#C5EAF7 0,transparent 100%),
    radial-gradient(3px 3px at 88% 70%,#BFE6F5 0,transparent 100%);
}
body[data-theme="sunset"]{
  --bg:#FFF1E4;--bg2:#FFE6D2;--card:#FFFBF6;--ink:#4A2C3A;--mut:#A5788A;
  --acc:#FF8A5C;--acc2:#E2597A;--ok:#2E9E6B;--ng:#E4506B;--line:#F4D6C4;--btnink:#fff;
  --accD:#E06B3F;--gnd:#8E6B9E;--gnd2:#7A588A;--scene:#FFF4E8;
  --sky1:#FFB27A;--sky2:#FFE3C4;--sea:#6E6BB8;--seaW:#8D8AD0;--mtn:#9A6BA8;--mtn2:#B287BE;
  --sand:#E8C79A;--lum:#FF9A4D;--starOp:.45;--cloud:rgba(255,244,225,.55);--tree:#6B4E80;--tree2:#84639A;
  background-image:
    radial-gradient(3px 3px at 18% 20%,#FFD3AE 0,transparent 100%),
    radial-gradient(2px 2px at 72% 14%,#fff7 0,transparent 100%),
    radial-gradient(3px 3px at 34% 78%,#FFC9A0 0,transparent 100%),
    radial-gradient(2px 2px at 88% 62%,#fff6 0,transparent 100%);
}
.wrap{max-width:560px;margin:0 auto;padding:calc(16px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-right)) calc(48px + env(safe-area-inset-bottom)) calc(14px + env(safe-area-inset-left))}
.btn,.subj,.choice{touch-action:manipulation}
.mk{font-weight:900;font-size:1.1em}
/* ---------- きょうのクエスト カード ---------- */
.qcard{background:var(--card);border:2px solid var(--line);border-radius:22px;overflow:hidden;margin:14px 0;box-shadow:0 5px 0 rgba(0,0,0,.08)}
.qscene{position:relative;height:196px;background:radial-gradient(130px 96px at 68% 54%,rgba(255,201,77,.30),transparent 72%),var(--scene)}
.qstake{position:absolute;left:12px;top:12px;z-index:3;display:inline-flex;align-items:center;gap:5px;
  background:var(--card);border:2px solid var(--line);border-radius:999px;padding:4px 11px 4px 7px;font-weight:900;font-size:.85rem}
.qstake em{font-style:normal;color:var(--mut);font-size:.68rem}
.qbub{position:absolute;left:10px;top:58px;z-index:3;background:var(--card);border:2px solid var(--line);
  border-radius:14px 14px 14px 4px;padding:6px 11px;font-weight:700;font-size:.78rem;max-width:56%}
.qmoko{position:absolute;left:12px;bottom:32px;width:84px;height:84px;z-index:2;filter:drop-shadow(0 6px 5px rgba(0,0,0,.22))}
.qchest{position:absolute;right:14px;bottom:28px;width:160px;height:128px;z-index:2}
.qgnd{position:absolute;left:0;right:0;bottom:0;height:56px;z-index:1}
.qprev{display:flex;gap:6px;padding:12px 12px 0}
.qchip{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:var(--bg2);
  border:2px solid var(--line);border-radius:13px;padding:8px 4px}
.qchip.zero{opacity:.4}
.qchip b{font-weight:900;font-size:1.05rem;line-height:1}
.qchip span{font-size:.6rem;font-weight:700;color:var(--mut)}
.qcta{display:flex;align-items:center;justify-content:center;gap:9px;width:calc(100% - 24px);margin:12px;
  border:none;cursor:pointer;font-family:inherit;background:var(--acc);color:var(--btnink);
  font-weight:900;font-size:1.2rem;letter-spacing:.04em;padding:16px 12px 15px;border-radius:18px;
  box-shadow:0 7px 0 var(--accD),0 12px 18px rgba(0,0,0,.22);
  transition:transform .07s ease,box-shadow .07s ease;touch-action:manipulation}
.qcta:active{transform:translateY(6px);box-shadow:0 1px 0 var(--accD),0 4px 8px rgba(0,0,0,.2)}
.qcta:focus-visible{outline:4px solid var(--acc2);outline-offset:3px}
.qcta .rw{display:inline-flex;align-items:center;gap:3px;background:rgba(0,0,0,.14);border-radius:999px;padding:3px 9px 3px 5px;font-size:.85rem}
.qcta.ghost{background:var(--card);color:var(--mut);border:2px solid var(--line);box-shadow:0 5px 0 rgba(0,0,0,.1);font-size:1rem}
.qcta.ghost:active{transform:translateY(4px);box-shadow:0 1px 0 rgba(0,0,0,.1)}
.qsub{text-align:center;font-size:.72rem;color:var(--mut);font-weight:700;padding-bottom:14px;margin-top:-4px}
.qlid{transform-box:fill-box;transform-origin:50% 100%}
.qlid.open{transform:rotate(-52deg) translate(-6px,4px)}
@media (prefers-reduced-motion:no-preference){
  .qlid:not(.open){animation:qjig 1.9s ease-in-out infinite}
  .qcrack{animation:qglow 1.9s ease-in-out infinite}
  .qsp{animation:qtw 1.6s ease-in-out infinite}
  .qsp:nth-of-type(2){animation-delay:.5s}.qsp:nth-of-type(3){animation-delay:1s}
  .qmoko{animation:qbob 2.6s ease-in-out infinite}
  .qarm{animation:qwave 1.4s ease-in-out infinite;transform-box:fill-box;transform-origin:20% 90%}
  .qcta:not(.ghost){animation:qnudge 3.4s ease-in-out infinite}
}
@keyframes qjig{0%,72%,100%{transform:rotate(0)}80%{transform:rotate(-5deg)}88%{transform:rotate(2deg)}}
@keyframes qglow{0%,100%{opacity:.35}50%{opacity:1}}
@keyframes qtw{0%,100%{opacity:0;transform:scale(.5)}50%{opacity:1;transform:scale(1)}}
@keyframes qbob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes qwave{0%,100%{transform:rotate(0)}50%{transform:rotate(-18deg)}}
@keyframes qnudge{0%,92%,100%{transform:translateY(0)}95%{transform:translateY(-3px)}}
/* ---------- shared ---------- */
.card{background:var(--card);border:2px solid var(--line);border-radius:22px;padding:18px;margin-bottom:14px;box-shadow:0 4px 0 var(--line)}
.btn{
  display:inline-block;font-family:inherit;font-weight:900;font-size:1.05rem;
  background:var(--acc);color:var(--btnink);border:none;border-radius:999px;
  padding:14px 26px;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.25);
  transition:transform .06s;
}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.25)}
.btn.ghost{background:transparent;color:var(--ink);border:2px solid var(--line);box-shadow:none}
.btn.small{font-size:.85rem;padding:9px 16px}
.btn:focus-visible,.choice:focus-visible,button:focus-visible,input:focus-visible{outline:3px solid var(--acc2);outline-offset:2px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.sp{flex:1}
h1{font-size:1.5rem;font-weight:900;letter-spacing:.04em}
h2{font-size:1.1rem;font-weight:900;margin-bottom:10px}
.mut{color:var(--mut);font-size:.85rem}
.pill{display:inline-flex;align-items:center;gap:5px;background:var(--bg2);border:2px solid var(--line);border-radius:999px;padding:6px 13px;font-weight:700;font-size:.9rem}
/* ---------- header ---------- */
.top{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.avatar{font-size:2rem;background:var(--bg2);border:2px solid var(--line);border-radius:50%;width:56px;height:56px;display:flex;align-items:center;justify-content:center}
/* ---------- subject cards ---------- */
.subj{display:flex;align-items:center;gap:14px;width:100%;text-align:left;font-family:inherit;color:var(--ink);cursor:pointer;background:var(--card);border:2px solid var(--line);border-radius:22px;padding:18px;margin-bottom:12px;box-shadow:0 4px 0 var(--line);transition:transform .06s}
.subj:active{transform:translateY(3px);box-shadow:0 1px 0 var(--line)}
.subj .ic{display:block;flex:none}
.subj .nm{font-size:1.2rem;font-weight:900}
.lvbar{height:8px;background:var(--bg2);border-radius:99px;overflow:hidden;margin-top:6px;border:1px solid var(--line)}
.lvbar>i{display:block;height:100%;background:var(--acc);border-radius:99px}
/* ---------- quiz ---------- */
.prog{height:12px;background:var(--bg2);border:2px solid var(--line);border-radius:99px;overflow:hidden;flex:1}
.prog>i{display:block;height:100%;background:var(--acc);transition:width .3s;border-radius:99px}
.buddy{width:44px;height:44px;display:block;flex:none;transition:transform .2s}
.buddy svg{width:100%;height:100%;display:block}
.buddy.happy{animation:hop .5s}
.mokoBig{width:120px;height:120px;margin:0 auto 4px;display:block}
.welMoko{width:104px;height:104px;display:inline-block}
.mokoBig svg{width:100%;height:100%;display:block}
.subj .ic svg{width:44px;height:44px;display:block}
.chbadge.srcb{display:inline-flex;align-items:center;gap:6px}
.chbadge.srcb svg{width:18px;height:18px;flex:none}
.pill.ico{display:inline-flex;align-items:center;gap:4px}
.pill.ico svg{width:15px;height:15px;flex:none}
/* ---------- 週間ゴール ---------- */
.wkcard{background:var(--card);border:2px solid var(--line);border-radius:20px;padding:12px 14px 11px;margin:14px 0}
.wkhd{display:flex;align-items:center;font-size:.86rem}
.wkhd b{font-weight:900}
.wkn{font-weight:900;font-size:.8rem;color:var(--mut)}
.wkn.hit{color:var(--ok)}
.wkdots{display:flex;gap:6px;margin:10px 0 8px}
.wkd{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.wkd>span{font-size:.62rem;font-weight:700;color:var(--mut)}
.wkd>i{width:26px;height:26px;border-radius:50%;background:var(--bg2);border:2px solid var(--line);
 display:grid;place-items:center}
.wkd>i svg{width:13px;height:13px}
.wkd.on>i{background:var(--ok);border-color:var(--ok)}
.wkd.on>span{color:var(--ink)}
.wkft{display:flex;align-items:center;gap:4px;font-size:.7rem;color:var(--mut);font-weight:700}
.wkft svg{width:14px;height:14px;flex:none;vertical-align:-2px}
/* ---------- やりすぎ防止 ---------- */
.restc{display:flex;align-items:center;gap:12px;background:var(--bg2);border:2px dashed var(--line);
 border-radius:20px;padding:12px 14px;margin:14px 0}
.restc b{font-size:.9rem}
.restMoko{width:52px;height:52px;flex:none;display:block}
/* ---------- ごほうびの おみせ(がちゃ) ---------- */
.gcard{display:flex;align-items:center;gap:14px;background:var(--card);border:2px solid var(--line);
 border-radius:22px;padding:14px 16px;margin:0 0 14px;box-shadow:0 5px 0 rgba(0,0,0,.08)}
.gleft{flex:none;width:104px}
.gmac{width:104px;height:122px;display:block}
.gright{flex:1;min-width:0}
.gttl{font-weight:900;font-size:1.05rem;margin-bottom:2px}
.gsub{font-size:.76rem;color:var(--mut);font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:3px;flex-wrap:wrap}
.gsub svg{width:13px;height:13px}
.gsub b{color:var(--ink)}
.qcta.gbtn{width:100%;margin:0 0 8px;padding:12px 10px 11px;font-size:1.05rem}
.gzu{display:flex;align-items:center;justify-content:center;gap:5px;width:100%;border:2px solid var(--line);
 background:var(--bg2);color:var(--ink);border-radius:13px;padding:8px;font-family:inherit;font-weight:900;
 font-size:.8rem;cursor:pointer;touch-action:manipulation}
.gzu b{color:var(--acc2)}
.gzu span{color:var(--mut)}
@media (prefers-reduced-motion:no-preference){
 .gmac.rdy .gknob{animation:knob 2.6s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
}
@keyframes knob{0%,84%,100%{transform:rotate(0)}90%{transform:rotate(24deg)}96%{transform:rotate(-8deg)}}
/* ---------- かぞくの木 ---------- */
.ftcard{display:flex;align-items:center;gap:14px;background:var(--card);border:2px solid var(--line);
 border-radius:22px;padding:14px 16px;margin:18px 0 0;box-shadow:0 5px 0 rgba(0,0,0,.08)}
.ftree{width:118px;height:104px;flex:none}
.ftinfo{flex:1;min-width:0}
.ftttl{font-weight:900;font-size:.8rem;color:var(--mut);letter-spacing:.12em}
.ftst{font-weight:900;font-size:1.1rem;margin:2px 0}
.ftfl{font-size:.72rem;color:var(--mut);font-weight:700;margin-bottom:8px}
.ftbar{height:10px;border-radius:6px;background:var(--bg2);border:1.5px solid var(--line);overflow:hidden}
.ftbar i{display:block;height:100%;background:linear-gradient(90deg,var(--ok),#8FD9C4);border-radius:6px;transition:width .4s}
.ftnx{font-size:.7rem;color:var(--mut);font-weight:700;margin-top:5px}
/* ---------- ほめスタンプ ---------- */
.stprow{gap:6px;flex-wrap:wrap}
.stp{width:44px;height:44px;border-radius:12px;border:2px solid var(--line);background:var(--bg2);
 font-size:1.35rem;cursor:pointer;display:grid;place-items:center;touch-action:manipulation;transition:transform .08s}
.stp:active{transform:scale(.92)}
.stp.sel{border-color:var(--acc);box-shadow:0 0 0 3px rgba(255,201,77,.3);background:var(--card)}
.stMoko{width:76px;height:76px;margin:0 auto;display:block}
/* ---------- なかま(おとも) ---------- */
.bud2{font-size:1.5rem;margin-left:-6px;transform:translateY(4px)}
.bud3{font-size:2.2rem;margin-bottom:14px}
.gitem{position:relative;border:2px solid var(--line);background:var(--card);cursor:pointer;font-family:inherit;color:var(--ink)}
.gitem.bud{border-color:var(--acc);box-shadow:0 0 0 3px rgba(255,201,77,.28)}
.kira{position:absolute;right:4px;top:2px;font-size:.9rem}
.budtag{position:absolute;left:4px;top:4px;background:var(--acc);color:var(--btnink);font-size:.55rem;font-weight:900;padding:1px 6px;border-radius:999px}
/* ---------- しまの道(ホーム) ---------- */
.isleHd{display:flex;align-items:center;gap:8px;margin:22px 2px 2px}
.isleHd b{font-size:.95rem;font-weight:900}
.isleHd .ln{flex:1;height:2px;background:var(--line);border-radius:2px}
.isle{position:relative;width:100%}
/* --- 背景(空・雲・海・山・森) --- */
.isleBg{position:absolute;inset:0;overflow:hidden;border-radius:26px;z-index:0;
 border:2px solid var(--line);background:linear-gradient(180deg,var(--sky1),var(--sky2) 62%)}
.isleBg>*{position:absolute}
.bgStars{left:0;top:0;width:100%;height:96px;opacity:var(--starOp)}
.bgLum{right:16px;top:14px;width:56px;height:56px}
.bgCloud{fill:var(--cloud)}
.bgCloud.c1{left:-70px;top:16px;width:78px}
.bgCloud.c2{left:-90px;top:44px;width:56px}
.bgCloud.c3{left:-60px;top:64px;width:64px}
.bgMtn{left:0;top:30px;width:100%;height:62px}
.bgSea{left:0;top:88px;width:100%;height:46px;background:var(--sea);overflow:hidden}
.bgSea svg{position:absolute;left:0;top:0;width:200%;height:100%}
.bgSand{left:0;top:126px;width:100%;height:30px}
.bgLand{left:0;right:0;top:140px;bottom:0;background:linear-gradient(180deg,var(--gnd),var(--gnd2))}
.bgHill{left:0;top:140px;width:100%;height:56px}
.bgTree{width:38px;height:48px}
@media (prefers-reduced-motion:no-preference){
 .bgCloud.c1{animation:cdrift 42s linear infinite}
 .bgCloud.c2{animation:cdrift 64s linear infinite;animation-delay:-12s}
 .bgCloud.c3{animation:cdrift 54s linear infinite;animation-delay:-30s}
 .bgWave1{animation:wroll 14s linear infinite}
 .bgWave2{animation:wroll 22s linear infinite reverse}
 .bgLum{animation:lumpulse 6s ease-in-out infinite}
}
@keyframes cdrift{from{transform:translateX(0)}to{transform:translateX(660px)}}
@keyframes wroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes lumpulse{0%,100%{opacity:.85}50%{opacity:1}}
.isle .trail{position:absolute;inset:0;width:100%;height:100%;overflow:visible;z-index:1}
.inode{position:absolute;transform:translate(-50%,-50%);width:80px;height:80px;z-index:2;
 border:none;background:none;padding:0;cursor:pointer;font-family:inherit;color:var(--ink);touch-action:manipulation}
.inode .ring{position:absolute;inset:0;border-radius:50%;background:var(--line);
 background:conic-gradient(var(--acc) calc(var(--p) * 1%), var(--line) 0)}
.inode .disc{position:absolute;inset:5px;border-radius:50%;background:var(--card);
 border:2px solid var(--card);display:grid;place-items:center;
 box-shadow:0 5px 0 rgba(0,0,0,.16),0 9px 16px rgba(0,0,0,.18);transition:transform .07s}
.inode:active .disc{transform:translateY(3px)}
.inode:focus-visible .ring{box-shadow:0 0 0 4px var(--acc2)}
.inode .disc svg{width:40px;height:40px;display:block}
.inode .lv{position:absolute;right:-4px;bottom:2px;background:var(--acc);color:var(--btnink);
 font-weight:900;font-size:.62rem;min-width:30px;padding:1px 5px;border-radius:999px;
 border:2px solid var(--card);z-index:3}
.inode .done{position:absolute;left:-4px;top:0;width:22px;height:22px;border-radius:50%;

function tone(f,delay,dur,type,vol){
  if(!S||!S.sound)return;
  try{
    const c=ac(),o=c.createOscillator(),g=c.createGain(),t=c.currentTime+delay;

}

let jaVoice=null,enVoice=null,voicesReady=false;
function loadVoices(){
 try{
  const vs=speechSynthesis.getVoices();if(!vs||!vs.length)return;

  voicesReady=true;
 }catch(e){}
}

function speak(text,lang){
 try{
  if(typeof speechSynthesis==='undefined')return;
  if(!voicesReady)loadVoices();

}

/* ---- migrate chain: v1/v2(固定p1/p2) → v3(UUID+order) ---- */
function migrate(){
 if(!S.profiles)S.profiles={};
 // v1/v2 形式(p1/p2固定キー)を UUID + order へ移行(履歴・コイン・図鑑を保持)
 if(!S.order){
  const order=[];const np={};
  for(const oldKey of Object.keys(S.profiles)){
   const id=uuid();np[id]=S.profiles[oldKey];order.push(id);
   if(S.active===oldKey)S.active=id;
  }
  S.profiles=np;S.order=order;
 }
 if(S.pin===undefined)S.pin='1234';
 if(S.sound===undefined)S.sound=true;
 if(S.appLock===undefined)S.appLock=null;
 if(S.coinCap===undefined)S.coinCap=COIN_CAP;
 if(S.cloud===undefined)S.cloud=null;
 if(!S.family)S.family={name:'',flower:0};
 if(S.family.legacy===undefined)S.family.legacy=S.family.flower||0; // 更新前の花は端末の「これまでのぶん」として保持
 if(S.lastSeen===undefined)S.lastSeen='';
 // 各プロファイルに不足フィールドを補完(後方互換)
 for(const id of S.order){
  const p=S.profiles[id];if(!p)continue;
  const dfl=newProfile();
  for(const k of ['coins','xp','streak','lastPlayed','sessionLen','autoRead','charms'])
   if(p[k]===undefined)p[k]=dfl[k];
  if(p.weekClaim===undefined)p.weekClaim='';
  if(p.coinCap===undefined)p.coinCap=null;
  if(p.buddy===undefined)p.buddy=null;
  if(p.flower===undefined)p.flower=0;
  for(const k of ['collection','log','reports','inbox'])if(!p[k])p[k]=dfl[k];
  if(p.lock===undefined)p.lock=null;
  if(!p.grade)p.grade='g34';
  if(!p.theme||!THEMES.some(t=>t.id===p.theme))p.theme='adventure';
  if(!p.created)p.created=today();
  if(p.lastBackup===undefined)p.lastBackup='';
  if(!p.subjects)p.subjects={};
  // 新教科(ことば・ざつがく)を学年帯にあわせて自動追加(既存教科には触れない)
  const gc=GRADES[p.grade];
  if(gc){for(const sk in gc.subs){if(!p.subjects[sk])p.subjects[sk]=newSubject(gc.subs[sk],(gc.caps&&gc.caps[sk])||null);}}
  for(const sk in p.subjects){
   const sb=p.subjects[sk];
   if(!sb.recent)sb.recent=[];
   if(!sb.miss)sb.miss={};
   if(!sb.items)sb.items={};
   if(sb.placement===undefined)sb.placement=false; // 既存ユーザーは実力が既に反映済みとみなす
   if(sb.lastUp===undefined)sb.lastUp='';
  }
 }
 S.version=SCHEMA_VERSION;
}

/* ================= utils ================= */
const R=n=>Math.floor(Math.random()*n);
function shuf(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=R(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}
function pickN(a,n){return shuf(a).slice(0,n);}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function ymd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
/* 「1日」の境界を朝4時とする(夜プレイでストリークが切れないように) */
function today(){return ymd(new Date(Date.now()-4*36e5));}
function daysAgo(n){return ymd(new Date(Date.now()-4*36e5-n*864e5));}
function dateAdd(s,n){const p=s.split('-');const d=new Date(+p[0],+p[1]-1,+p[2]);d.setDate(d.getDate()+n);return ymd(d);}
function dateDiff(a,b){const pa=a.split('-'),pb=b.split('-');return Math.round((new Date(+pa[0],+pa[1]-1,+pa[2])-new Date(+pb[0],+pb[1]-1,+pb[2]))/864e5);}
function toHira(s){return s.replace(/[\u30a1-\u30f6]/g,c=>String.fromCharCode(c.charCodeAt(0)-0x60));}
function toHalf(s){return s.replace(/[０-９．]/g,c=>c==='．'?'.':String.fromCharCode(c.charCodeAt(0)-0xFEE0));}
function mkChoice(correct,wrongs,text,big,key,x,extra){
 const arr=shuf([{t:correct,ok:1}].concat(wrongs.map(w=>({t:w,ok:0}))));
 return Object.assign({type:'choice',big:big,text:text,choices:arr.map(o=>o.t),a:arr.findIndex(o=>o.ok),x:x,key:key},extra||{});
}

/* バンク出題の共通ピッカー: 「見たことがない問題 → いちばん昔に見た問題」を優先する。
   同じ問題がすぐ出て飽きる、を根本から防ぐ(問題単位の履歴を使う)。 */
function pickBank(list,lv,p,subjKey){
 let pool=list.filter(r=>r.l===lv);
 if(Math.random()<.3){const p2=list.filter(r=>r.l<=lv);if(p2.length)pool=p2;}
 if(p&&p.subjects&&p.subjects[subjKey]){
  const items=p.subjects[subjKey].items||{};
  const scored=pool.map(it=>({it,seen:(items[it.id]&&items[it.id].last)||''}));
  scored.sort((a,b)=>a.seen<b.seen?-1:a.seen>b.seen?1:0); // ''(未出題)が先頭、次に古い順
  const unseenN=scored.filter(x=>!x.seen).length;
  // 未出題が3問以上のこっているうちは、未出題からだけ出す
  const take=unseenN>=3?unseenN:Math.max(3,Math.ceil(scored.length*0.4));
  return scored[R(Math.min(take,scored.length))].it;
 }
 return pool[R(pool.length)];
}

 qs.push(Object.assign(mkChoice(c.c[c.a],c.c.filter((_,i)=>i!==c.a),c.q,'💡','ちょうせん',c.x),{ch:true,subj:subj}));
 return qs;
}
/* ---- P1-1 きょうのミッション: 復習(SRS due)40% / 弱点30% / 新規 で自動編成 ---- */
function dueItemsOf(p){
 const t=today(),out=[];
 for(const sk in p.subjects){const items=p.subjects[sk].items||{};
  for(const key in items){const it=items[key];if(it.due&&dateDiff(it.due,t)<=0)out.push({subject:sk,key:key,st:it.st||0});}}
 return out;
}
function weakItemsOf(p){
 const out=[];
 for(const sk in p.subjects){const miss=p.subjects[sk].miss||{};
  for(const key in miss){if(miss[key]>=2)out.push({subject:sk,key:key,n:miss[key]});}}
 return out.sort((a,b)=>b.n-a.n);
}
/* keyを実際の問題に。rikaは同一問を再現、生成教科は同教科・同レベルで新規生成(近似復習)。 */
function questionFor(p,subject,key,src){
 let q=null;
 const bk=BANKS[subject];
 if(bk&&bk.type==='bank'){const it=bk.items.find(r=>r.id===key);if(it)q=mkChoice(it.c[0],it.c.slice(1),it.q,it.b,it.id,it.x);}
 if(!q)q=genQ(subject,p.subjects[subject].level,p);
 q.subj=subject;q.src=src;return q;
}
/* ミッションの内訳は必ずここから導く(表示と出題の食い違いを防ぐ単一の真実) */
function missionSlots(p){
 const len=Math.min(10,(p.sessionLen||8)+2);
 const due=dueItemsOf(p);
 const inDue={};due.forEach(d=>{inDue[d.subject+'|'+d.key]=1;});
 // 復習に入る問題は弱点枠から除外(同じ問題が二重に数えられるのを防ぐ)
 const weak=weakItemsOf(p).filter(w=>!inDue[w.subject+'|'+w.key]);
 const nReview=Math.min(Math.round(len*0.4),due.length);
 const nWeak=Math.min(Math.round(len*0.3),weak.length);
 const nNew=Math.max(0,len-nReview-nWeak);
 return {len,due,weak,nReview,nWeak,nNew,mins:Math.max(3,Math.round(len*0.55))};
}
function buildMission(p){
 const s=missionSlots(p);
 const due=shuf(s.due.slice()), weak=shuf(s.weak.slice());
 const subs=Object.keys(p.subjects);
 const qs=[],used={};
 const add=(q)=>{const sig=(q.subj||'')+'|'+q.key+'|'+(q.big||'')+'|'+q.text;if(used[sig])return false;used[sig]=1;qs.push(q);return true;};
 // 生成教科は乱数なので、重複したら数回引き直す(枠を落とさない)
 const fill=(list,n,src)=>{let got=0;
  for(let i=0;i<list.length&&got<n;i++){
   for(let t=0;t<6;t++){if(add(questionFor(p,list[i].subject,list[i].key,src))){got++;break;}}
  }
  return got;};
 fill(due,s.nReview,'review');
 fill(weak,s.nWeak,'weak');
 let guard=0,ri=R(subs.length);
 while(qs.length<s.len&&guard++<300){const sk=subs[(ri++)%subs.length];const q=genQ(sk,p.subjects[sk].level,p);q.subj=sk;q.src='new';add(q);}
 return shuf(qs);
}
function missionStatus(p){
 const s=missionSlots(p);
 return {due:s.due.length,weak:s.weak.length,done:!!(p.mission&&p.mission.date===today())};
}
/* 出題せずにミッションの内訳だけ算出(カード表示用。buildMissionと同じ配分を共有) */
function missionPlan(p){
 const s=missionSlots(p);
 return {len:s.len,nReview:s.nReview,nWeak:s.nWeak,nNew:s.nNew,mins:s.mins,
  done:!!(p.mission&&p.mission.date===today())};
}

function handleAns(ok){
 const p=curP(),quiz=V.quiz,q=quiz.qs[quiz.idx];
 const sk=q.subj||quiz.subj; // ミッションは問題ごとに教科が異なる
 quiz.answered=true;
 const rt=quiz.qShownAt?Math.min(Date.now()-quiz.qShownAt,600000):0; // 回答時間ms
 const isRetry=!!q.retry;
 if(ok){quiz.correct++;if(!isRetry)quiz.coins+=q.ch?2:1;else quiz.coins+=0;p.xp+=isRetry?0:2;SFX.ok();}
 else SFX.ng();
 // とき直し(再出題)分は習熟判定・履歴から除外
 if(!q.ch&&!isRetry){
  const sb=p.subjects[sk];
  // recent(=レベル判定の窓)は単一教科セッションのみ。ミッションは記録するがレベルは動かさない
  if(!quiz.mission){sb.recent.push(ok?1:0);const win=(sb.placement?4:8);if(sb.recent.length>win)sb.recent.shift();}
  if(!ok)sb.miss[q.key]=(sb.miss[q.key]||0)+1;
  else if(sb.miss[q.key]){sb.miss[q.key]--;if(sb.miss[q.key]<=0)delete sb.miss[q.key];} // 正解で弱点を1つ回復
  // 問題単位の履歴 + SRS
  const it=sb.items[q.key]||(sb.items[q.key]={s:0,c:0,st:0,last:'',due:null,ms:[]});
  it.s++;if(ok)it.c++;
  it.last=today();
  if(ok){it.st=(it.st||0)+1;it.due=dateAdd(today(),srsInterval(it.st));}
  else{it.st=0;it.due=dateAdd(today(),1);}
  if(rt){it.ms.push(rt);if(it.ms.length>5)it.ms.shift();}
  // 誤答はこのセッション末尾に1回だけ再出題(とき直しキュー)
  if(!ok&&!quiz.qs.slice(quiz.idx+1).some(x=>x.key===q.key&&x.retry)){
   const rq=Object.assign({},q,{retry:true});
   if(rq.type==='choice'){const arr=shuf(rq.choices.map((t,i)=>({t,ok:i===rq.a})));rq.choices=arr.map(o=>o.t);rq.a=arr.findIndex(o=>o.ok);}
   quiz.qs.push(rq);
  }
 }
 const t=today();
 if(!p.log[t])p.log[t]={a:0,c:0,s:{}};
 const L=p.log[t];L.a++;if(ok)L.c++;
 if(!L.s[sk])L.s[sk]={a:0,c:0};
 L.s[sk].a++;if(ok)L.s[sk].c++;
 if(ok)p.flower=(p.flower||0)+1; // かぞくの木の花は本人に記録(端末をまたいで合流できるように)
 save();render();
 const bd=document.getElementById('buddy');
 if(bd&&ok){bd.classList.add('happy');}
}

function finishS(){
 const p=curP(),quiz=V.quiz;
 const t=today();
 const acc=quiz.correct/quiz.qs.length;
 if(acc>=1){quiz.coins+=3;}
 if(!quiz.mission){
  const sb=p.subjects[quiz.subj],mx=sb.max||SUBJ[quiz.subj].max;
  const win=sb.placement?4:8;
  if(sb.recent.length>=win){
   const s=sb.recent.reduce((a,b)=>a+b,0);
   const upT=sb.placement?win:7, dnT=sb.placement?1:3;
   let moved=false;
   if(s>=upT&&sb.level<mx){
    /* レベルアップは1教科につき1日1回まで(実力判定モードは除外)。
       1日で駆け上がる→難問だらけ→挫折、を防ぐ。窓は保持して翌日に持ちこす。 */
    if(sb.placement||sb.lastUp!==t){
     sb.level++;sb.recent=[];sb.lastUp=t;quiz.lvMsg='up';moved=true;SFX.lvup();
    }else{
     quiz.lvMsg='soon';
    }
   }
   else if(s<=dnT&&sb.level>1){sb.level--;sb.recent=[];quiz.lvMsg=sb.placement?'find':'down';moved=true;}
   if(sb.placement){
    sb._noMove=moved?0:((sb._noMove||0)+1);
    if(sb._noMove>=2){sb.placement=false;delete sb._noMove;}
   }
  }
 }else{
  // ミッション: 1日1回クリアでボーナス
  if(!p.mission||p.mission.date!==today()){quiz.coins+=5;quiz.missionFirst=true;}
  p.mission={date:today(),done:true};
 }
 // --- 1日のコイン上限(遊ぶこと自体は止めない。コインだけ止まる) ---
 const L=p.log[t]||(p.log[t]={a:0,c:0,s:{}});
 const room=Math.max(0,effCap(p)-(L.k||0));
 let gain=quiz.coins;
 if(gain>room){gain=room;quiz.capped=true;}
 L.k=(L.k||0)+gain;
 p.coins+=gain;
 quiz.gained=gain;
 // --- ストリーク(おまもりで1〜2日の抜けを守る) ---
 if(p.lastPlayed!==t){
  if(clockSafe){
   const gap=p.lastPlayed?dateDiff(t,p.lastPlayed):999;
   if(gap===1)p.streak=(p.streak||0)+1;
   else if(gap>1&&gap<=3&&(p.charms||0)>=gap-1){
    p.charms-=(gap-1);p.streak=(p.streak||0)+1;quiz.charmUsed=gap-1;
   }
   else p.streak=1;
  }
  p.lastPlayed=t;
 }
 // --- 週間ゴール(達成は週1回だけ。ごほうびは上限の対象外) ---
 const wk=weekKey(t);
 if(p.weekClaim!==wk&&weekDone(p)>=WEEK_GOAL){
  p.weekClaim=wk;
  p.coins+=WEEK_REWARD;
  p.charms=Math.min(CHARM_MAX,(p.charms||0)+1);
  quiz.weekBonus=true;
 }
 pruneLogs(p);
 if(!quiz.lvMsg)SFX.fanfare();
 save();
 V.screen='result';render();
}
/* P3: 90日超の日次ログを月次に集約 */
function pruneLogs(p){
 const cut=daysAgo(90);
 if(!p.logM)p.logM={};
 for(const k of Object.keys(p.log)){
  if(dateDiff(k,cut)<0){
   const mo=k.slice(0,7),L=p.log[k];
   const M=p.logM[mo]||(p.logM[mo]={a:0,c:0});
   M.a+=L.a||0;M.c+=L.c||0;
   delete p.log[k];
  }
 }
}

  +'<span class="pill">本日のコイン '+coinsToday(p)+'/'+effCap(p)+'</span>'

 h+='<table><tr><th>教科</th><th>Lv</th><th>7日正答率</th><th>平均秒</th><th>苦手</th></tr>';
 for(const sk in p.subjects){
  const sb=p.subjects[sk];
  let a=0,c=0;
  for(let i=0;i<7;i++){const L=p.log[daysAgo(i)];if(L&&L.s[sk]){a+=L.s[sk].a;c+=L.s[sk].c;}}
  const acc=a?Math.round(c/a*100)+'%':'-';
  let msum=0,mn=0;for(const k in sb.items){const it=sb.items[k];if(it.ms&&it.ms.length){msum+=it.ms.reduce((x,y)=>x+y,0);mn+=it.ms.length;}}
  const avg=mn?(msum/mn/1000).toFixed(1):'-';
  const miss=Object.entries(sb.miss).sort((x,y)=>y[1]-x[1]).slice(0,3).map(m=>bankLabel(sk,m[0])+'×'+m[1]).join('、')||'-';
  h+='<tr><td>'+SUBJ[sk].n+(sb.placement?'<span class="mut">🔍</span>':'')+'</td><td>'+sb.level+'/'+(sb.max||SUBJ[sk].max)+'</td><td>'+acc+'</td><td>'+avg+'</td><td style="font-size:.72rem">'+esc(miss)+'</td></tr>';
 }
 h+='</table>';
 h+='<div class="mut" style="margin-top:10px">直近7日の回答数(緑=正解)</div><div class="chart">';
 let mx=1;const days=[];
 for(let i=6;i>=0;i--){const d=daysAgo(i),L=p.log[d]||{a:0,c:0};days.push([d,L]);if(L.a>mx)mx=L.a;}
 for(const[d,L]of days)h+='<div class="col"><div class="bar" style="height:'+(L.a/mx*70+4)+'px"><i style="height:'+(L.a?L.c/L.a*100:0)+'%"></i></div><div class="dl">'+d.slice(5)+'</div></div>';
 h+='</div>';
 // 誤答報告
 if(p.reports&&p.reports.length){

  h+='</div>';
 }
 // 学年帯の変更
 h+='<div class="row" style="margin-top:10px"><label style="margin:0">学年帯</label><select id="gr_'+pid+'" style="flex:1">'
  +Object.keys(GRADES).map(g=>'<option value="'+g+'"'+(p.grade===g?' selected':'')+'>'+GRADES[g].label+'</option>').join('')
  +'</select><button class="btn ghost small" onclick="setGrade(\''+pid+'\')">変更</button></div>';
 h+='<div class="mut" style="font-size:.7rem;margin-top:2px">※ 教科セットを更新します(既存教科のレベル・履歴は保持)</div>';
 // この子だけのコイン上限
 h+='<div class="row" style="margin-top:10px"><label style="margin:0">コイン上限(この子だけ)</label>'
  +'<input type="tel" id="cap_'+pid+'" value="'+(p.coinCap||'')+'" maxlength="3" placeholder="全体設定('+(S.coinCap||COIN_CAP)+')" style="flex:1;min-width:90px">'

 h+='<div class="mut" style="font-size:.7rem;margin-top:2px">※ 空欄にして変更すると、全体設定に戻ります</div>';

 const pend=(p.inbox||[]).filter(m=>!m.read).length;
 h+='<div style="margin-top:12px"><label style="margin:0 0 4px;display:block">ほめスタンプを送る'+(pend?'<span class="mut">(未読 '+pend+')</span>':'')+'</label>';
 h+='<div class="row stprow" data-pid="'+pid+'">';
 for(const st of STAMPS)h+='<button class="stp" onclick="pickStamp(\''+pid+'\',\''+st+'\',this)">'+st+'</button>';
 h+='</div>';

/* ================= たんまつ間の ひっこしリンク =================
   全データを圧縮してURLの#以降に埋め込む。#以降はサーバーに送信されないので、
   GitHub Pagesの静的ホスティングでもデータが外部に出ない。
   注意: これは「同期」ではなく「転送」。最後に読み込んだ側が正になる。 */
function b64u(bytes){let s='';for(let i=0;i<bytes.length;i++)s+=String.fromCharCode(bytes[i]);return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');}
function ub64u(str){const b=atob(str.replace(/-/g,'+').replace(/_/g,'/'));const out=new Uint8Array(b.length);for(let i=0;i<b.length;i++)out[i]=b.charCodeAt(i);return out;}
async function syncEncode(json){
 try{
  if(typeof CompressionStream!=='undefined'){
   const stream=new Blob([json]).stream().pipeThrough(new CompressionStream('gzip'));
   const buf=await new Response(stream).arrayBuffer();
   return 'g'+b64u(new Uint8Array(buf));
  }
 }catch(e){}
 return 'p'+b64u(new TextEncoder().encode(json));
}
async function syncDecode(payload){
 const mode=payload[0],body=payload.slice(1);
 const bytes=ub64u(body);
 if(mode==='g'){
  const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
  return await new Response(stream).text();
 }
 return new TextDecoder().decode(bytes);
}
async function makeSyncLink(){
 SFX.click();

 const base=(typeof location!=='undefined')?location.href.split('#')[0]:'';

 render();
}

   try{await Storage.set('manabiquest-backup',JSON.stringify(S));}catch(e){}
   S=o;migrate();V.unlocked=true;V.pid=null;S.active=null;save();
   handled=true;
  }
 }catch(e){alert('リンクのデータを読み込めませんでした');}
 try{history.replaceState(null,'',location.pathname+location.search);}catch(e){}
 return handled;
}
/* ================= かぞく同期(ゼロ知識・ベータ) =================
   あいことば → PBKDF2(31万回) → 512bit を導出し、
   前半256bit = AES-GCM鍵(端末の外に出ない) / 後半256bit = 保管場所ID(サーバーの行キー)。
   サーバー(Supabase)が持つのは {意味不明なID, 暗号文, 更新時刻} だけ。
   あいことばを知らない限り、運営者にもサーバー侵入者にも中身は読めない。 */
const CLOUD_ITER=310000;
async function kdf(pass){
 const enc=new TextEncoder();
 const km=await crypto.subtle.importKey('raw',enc.encode(pass),'PBKDF2',false,['deriveBits']);
 const bits=await crypto.subtle.deriveBits(
  {name:'PBKDF2',salt:enc.encode('manabiquest-sync-v1'),iterations:CLOUD_ITER,hash:'SHA-256'},km,512);
 const by=new Uint8Array(bits);
 const key=await crypto.subtle.importKey('raw',by.slice(0,32),'AES-GCM',false,['encrypt','decrypt']);
 return {key,id:b64u(by.slice(32))};
}
async function cloudEncrypt(json,key){
 const inner=await syncEncode(json); // gzip+base64url(既存機構を再利用)
 const iv=crypto.getRandomValues(new Uint8Array(12));
 const ct=new Uint8Array(await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(inner)));
 const out=new Uint8Array(12+ct.length);out.set(iv,0);out.set(ct,12);
 return b64u(out);
}
async function cloudDecrypt(payload,key){
 const by=ub64u(payload);
 const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:by.slice(0,12)},key,by.slice(12));
 return await syncDecode(new TextDecoder().decode(new Uint8Array(pt)));
}
/* クラウドの家族データから「この子だけ」取り込む(2台同時遊びのあとの合流用)。
   まるごとダウンロードと違い、この端末のほかの子は無傷のまま。 */
async function cloudFetchPick(){
 if(V.cloudBusy)return;V.cloudBusy=true;V.cloudMsg='クラウドを確認中…';V.cloudPick=null;render();
 try{
  const {key,id}=await kdf(S.cloud.pass);
  const row=await cloudCall('mq_get',{p_id:id});
  if(!row||!row.blob){V.cloudMsg='クラウドにデータが見つかりません。まだアップロードしていないか、あいことばが他の端末と違う可能性があります';V.cloudBusy=false;render();return;}
  let json;
  try{json=await cloudDecrypt(row.blob,key);}
  catch(e){V.cloudMsg='復号できませんでした。あいことばが違う可能性があります';SFX.ng();V.cloudBusy=false;render();return;}
  const o=JSON.parse(json);
  const err=validImport(o);
  if(err){V.cloudMsg='データが不正です('+err+')';V.cloudBusy=false;render();return;}
  if(!o.order||!o.order.length){V.cloudMsg='クラウドのデータに なかまが いません';V.cloudBusy=false;render();return;}
  V.cloudPick={state:o,when:row.updated_at?new Date(row.updated_at).toLocaleString('ja-JP'):'不明'};
  V.cloudMsg='';
 }catch(e){V.cloudMsg='失敗: '+(e.message||'通信エラー')+'。URL・キー・接続を確認してください';SFX.ng();}
 V.cloudBusy=false;render();
}

async function cloudCall(fn,body){
 /* 旧形式キー(eyJ…のJWT)は apikey + Authorization の両方、
    新形式キー(sb_publishable_…)は Authorization: Bearer に入れると拒否されるため apikey のみ */
 const hdr={'Content-Type':'application/json','apikey':S.cloud.key};
 if(S.cloud.key.indexOf('eyJ')===0)hdr['Authorization']='Bearer '+S.cloud.key;
 const r=await fetch(S.cloud.url.replace(/\/$/,'')+'/rest/v1/rpc/'+fn,{
  method:'POST',
  headers:hdr,
  body:JSON.stringify(body)});
 if(!r.ok)throw new Error('server '+r.status);
 const t=await r.text();
 return t?JSON.parse(t):null;
}

 }catch(e){V.cloudMsg='失敗: '+(e.message||'通信エラー')+'。URL・キー・接続を確認してください';SFX.ng();}
 V.cloudBusy=false;render();

/* ================= かぞく同期 かんたんセットアップ(ウィザード) =================
   NonITの保護者が迷わない設計:
   - ダッシュボードのURLを貼ってもプロジェクトURLに自動変換
   - SQLはボタン1つでコピー
   - あいことばは自動生成(弱い合言葉と総当たりの対策)
   - 最後に実際に接続し、失敗原因を特定して案内 */
const WIZ_SQL=`create table if not exists mq_sync (
  id text primary key,
  blob text not null,
  updated_at timestamptz not null default now()
);
alter table mq_sync enable row level security;
create or replace function mq_put(p_id text, p_blob text)
returns void language sql security definer set search_path = public as $$
  insert into mq_sync (id, blob, updated_at) values (p_id, p_blob, now())
  on conflict (id) do update set blob = excluded.blob, updated_at = now();
$$;
create or replace function mq_get(p_id text)
returns table(blob text, updated_at timestamptz)
language sql security definer set search_path = public stable as $$
  select blob, updated_at from mq_sync where id = p_id;
$$;
create or replace function mq_check_size() returns trigger language plpgsql as $$
begin
  if length(new.blob) > 2000000 then raise exception 'blob too large'; end if;
  return new;
end; $$;
drop trigger if exists mq_size_guard on mq_sync;
create trigger mq_size_guard before insert or update on mq_sync
for each row execute function mq_check_size();`;
/* 何を貼られてもプロジェクトURLに正規化する(NonITの最大のつまずき対策) */
function normalizeSbUrl(v){
 v=(v||'').trim();
 let m=v.match(/supabase\.com\/dashboard\/project\/([a-z0-9]{15,30})/i);
 if(m)return 'https://'+m[1].toLowerCase()+'.supabase.co';
 m=v.match(/^(?:https?:\/\/)?([a-z0-9]{15,30})\.supabase\.co/i);
 if(m)return 'https://'+m[1].toLowerCase()+'.supabase.co';
 m=v.match(/^([a-z0-9]{15,30})$/i);
 if(m)return 'https://'+m[1].toLowerCase()+'.supabase.co';
 return null;
}
function validSbKey(k){
 k=(k||'').trim();
 if(/^sb_secret_/.test(k)||k.indexOf('service_role')>=0)return 'secret';
 if(/^eyJ/.test(k)&&k.length>60)return 'ok';
 if(/^sb_publishable_/.test(k)&&k.length>20)return 'ok';
 return 'bad';
}
/* あいことば自動生成: ことば4つ+数字2けた。人間が発明するより強く、読み上げて伝えやすい */
const PASS_WORDS=['ぱんだ','れもん','ろけっと','めろん','きりん','たいこ','ぷりん','こあら','とまと','らっこ','みかん','ぴあの','うちゅう','くじら','どーなつ','かもめ','さくら','ばなな','らくだ','こんぺいとう','ぎょうざ','しまうま','ほたる','まぐろ','つばめ','おにぎり','かぶとむし','ひまわり','ぺんぎん','たこやき','いるか','もみじ'];
function genPass(){
 const a=new Uint32Array(5);crypto.getRandomValues(a);
 let w='';for(let i=0;i<4;i++)w+=PASS_WORDS[a[i]%PASS_WORDS.length];
 return w+(10+a[4]%90);
}
function wizGo(step){SFX.click();V.wiz=V.wiz||{};V.wiz.step=step;V.wiz.msg='';render();}
function wizCopySql(){
 try{navigator.clipboard&&navigator.clipboard.writeText(WIZ_SQL);}catch(e){}
 try{const t=document.getElementById('wizSql');if(t){t.select();document.execCommand('copy');}}catch(e){}
 V.wiz.msg='コピーしました! SupabaseのSQL Editorに貼って RUN を押してください';SFX.ok();render();
}
function wizGenPass(){const e=document.getElementById('wizPass');if(e)e.value=genPass();SFX.ok();}
function wizSaveUrlKey(){
 const u=document.getElementById('wizUrl'),k=document.getElementById('wizKey');
 const url=normalizeSbUrl(u&&u.value);
 if(!url){V.wiz.msg='URLが読み取れません。Supabaseの画面を開いたときのブラウザのアドレスをそのまま貼ればOKです';render();return;}
 const kv=validSbKey(k&&k.value);
 if(kv==='secret'){V.wiz.msg='それは秘密キーです! 使ってはいけません。「anon public」か「sb_publishable_…」のキーを貼ってください';render();return;}
 if(kv!=='ok'){V.wiz.msg='キーの形が違うようです。「eyJ…」か「sb_publishable_…」で始まる長い文字列を貼ってください';render();return;}
 V.wiz.url=url;V.wiz.key=k.value.trim();
 wizGo(4);
}
async function wizFinish(){
 const e=document.getElementById('wizPass');
 const pass=(e&&e.value.trim())||'';
 if(pass.length<8){V.wiz.msg='あいことばは8文字以上に。「じどうで作る」を押すのがおすすめです';render();return;}
 V.wiz.pass=pass;
 V.wiz.busy=true;V.wiz.msg='せつぞくを確認しています…';render();
 const saved=S.cloud;
 S.cloud={url:V.wiz.url,key:V.wiz.key,pass:pass,lastPush:'',lastPull:''};
 try{
  const {id}=await kdf(pass);
  await cloudCall('mq_get',{p_id:id}); // 行が無くてもOK。関数が無い/キー違いはここで例外になる
  save();SFX.fanfare();
  V.wiz.busy=false;V.wiz.step=5;V.wiz.msg='';
 }catch(err){
  S.cloud=saved;
  V.wiz.busy=false;
  const m=String(err&&err.message||'');
  if(m.indexOf('404')>=0)V.wiz.msg='つながりましたが、準備のSQLがまだ実行されていないようです。手順2に戻って、SQLを貼って RUN してください';
  else if(m.indexOf('401')>=0||m.indexOf('403')>=0)V.wiz.msg='キーが違うようです。手順3に戻って、公開用キーを貼り直してください';
  else V.wiz.msg='サーバーにつながりませんでした。URLが正しいか、インターネットにつながっているか確認してください';
  SFX.ng();
 }
 render();
}
/* ---- この子だけの合流リンク(#mp=): 置き換えではなく「なかまに追加」する ---- */
async function makeProfileLink(pid){
 SFX.click();
 const p=S.profiles[pid];if(!p)return;
 const payload=await syncEncode(JSON.stringify({one:1,version:SCHEMA_VERSION,profile:p}));
 const base=(typeof location!=='undefined')?location.href.split('#')[0]:'';
 V.pSyncUrl=base+'#mp='+payload;
 V.pSyncPid=pid;
 render();
}
function copyPSync(){
 try{const t=document.getElementById('psyncTa');if(t){t.select();document.execCommand('copy');}}catch(e){}
 try{navigator.clipboard&&navigator.clipboard.writeText(V.pSyncUrl);}catch(e){}
 SFX.ok();
}
function sharePSync(){
 try{if(navigator.share){navigator.share({title:'まなびクエスト なかま合流リンク',url:V.pSyncUrl});return;}}catch(e){}
 copyPSync();alert('リンクをコピーしました。AirDropやメッセージで送ってください');
}
function validProfile(o){
 if(!o||typeof o!=='object')return 'データの形式が正しくありません';
 if(o.one!==1||!o.profile)return 'なかま合流リンクではありません';
 const p=o.profile;
 if(typeof p.name!=='string'||p.name.length<1||p.name.length>40)return 'なまえが不正です';
 if(!p.subjects||typeof p.subjects!=='object')return '学習データがありません';
 if(JSON.stringify(p).length>400000)return 'データが大きすぎます';
 return null;
}
function updateProfileData(id,pr){
 if(!S.profiles[id])return 'なかまが見つかりません';
 const np=JSON.parse(JSON.stringify(pr));
 S.profiles[id]=np; // idはそのまま=アクティブ選択などの参照を壊さない
 migrate(); // 欠けフィールドの補完
 save();
 return null;
}
function mergeProfile(pr){
 if(S.order.length>=12)return 'この端末は なかまが上限(12人)です';
 const np=JSON.parse(JSON.stringify(pr));
 // 同名がいたら「②」を付けて区別(データは別人として保持)
 let nm=np.name;
 const names=S.order.map(id=>S.profiles[id].name);
 let k=2;while(names.includes(nm)){nm=np.name+'('+k+')';k++;}
 np.name=nm;
 const id=uuid();
 S.profiles[id]=np;S.order.push(id);
 migrate(); // 欠けフィールドの補完
 save();
 return null;
}
/* 受け取ったプロフィール1人分を、確認をとりながら この端末へ反映する。
   同名あり → 上書き? → いいえなら 別として追加? / 同名なし → 追加?
   反映したら true を返す(#mp=リンクとクラウド取り込みで共通)。 */
function interactiveMergeProfile(pr){
 const nm=pr.name;
 const exist=S.order.find(id=>S.profiles[id]&&S.profiles[id].name===nm);
 if(exist){
  if(confirm('「'+nm+'」は この端末にも います。\n受け取ったデータで 上書き(こうしん)しますか?\n\nOK = 上書きする(この端末での「'+nm+'」のその後の進みは消えます)\nキャンセル = 上書きしない')){
   const uerr=updateProfileData(exist,pr);
   if(uerr){alert(uerr);return false;}
   return true;
  }
  if(confirm('では、「'+nm+'(2)」のように 別のなかまとして 追加しますか?')){
   const merr=mergeProfile(pr);
   if(merr){alert(merr);return false;}
   return true;
  }
  return false;
 }
 if(confirm('「'+nm+'」を この端末の なかまに くわえますか?\n(この端末の ほかのなかまは そのままです)')){
  const merr=mergeProfile(pr);
  if(merr){alert(merr);return false;}
  return true;
 }
 return false;
}

 V.syncUrl=null;V.pSyncUrl=null;V.pSyncPid=null;

function validImport(o){
 if(!o||typeof o!=='object')return 'データの形式が正しくありません';
 if(typeof o.version!=='number'||o.version>SCHEMA_VERSION+1)return 'バージョンが対応していません';
 if(!o.profiles||typeof o.profiles!=='object')return 'プロファイル情報がありません';
 const keys=Object.keys(o.profiles);
 if(keys.length===0||keys.length>12)return 'プロファイル数が不正です';
 for(const k of keys){const p=o.profiles[k];if(!p||typeof p!=='object'||typeof p.name!=='string'||p.name.length>40||!p.subjects)return 'プロファイルの中身が不正です';}
 return null;
}
function doImport(){
 const t=document.getElementById('impTa');if(!t)return;
 let o;
 try{o=JSON.parse(t.value.trim());}catch(e){V.ieOk=false;V.ieMsg='読み込めませんでした(文字が正しくありません)';render();return;}
 const err=validImport(o);
 if(err){V.ieOk=false;V.ieMsg='読み込めませんでした('+err+')';render();return;}
 // 既存データを控えに退避してから置換
 try{Storage.set('manabiquest-backup',JSON.stringify(S));}catch(e){}
 S=o;migrate();
 V.pid=null;V.demo=false;S.active=null;V.unlocked=true;
 save();SFX.fanfare();V.ieOk=true;V.ieMsg='読み込みました!';V.screen='profiles';render();
}

/* ---- report (P4-4) ---- */
function reportItem(){
 const p=curP(),quiz=V.quiz,q=quiz.qs[quiz.idx];if(!p||!q)return;
 const t=today();
 p.reports=p.reports||[];
 if(p.reports.some(r=>r.itemId===q.key&&r.date===t)){SFX.click();return;}
 p.reports.push({itemId:q.key,subject:quiz.subj,level:p.subjects[quiz.subj].level,date:t,myAnswer:q.type==='choice'?(q.choices[quiz.picked]||''):quiz.inpVal});
 save();SFX.ok();
 const b=event&&event.target;if(b)b.textContent='🚩 ありがとう!';
}
function delReport(pid,i){const p=S.profiles[pid];if(p&&p.reports){p.reports.splice(i,1);save();render();}}

/* ---- praise inbox (P2-3) ---- */
const STAMPS=['🌟','💮','👏','💪','🎉','❤️'];
let stampSel={}; // pid -> chosen stamp (画面状態のみ、保存しない)
function pickStamp(pid,st,btn){
 stampSel[pid]=st;SFX.click();
 const row=btn.parentElement;
 for(const b of row.children)b.classList.toggle('sel',b===btn);

function sendStamp(pid){
 const p=S.profiles[pid];if(!p)return;
 const st=stampSel[pid];
 if(!st){alert('スタンプを選んでください');return;}
 const e=document.getElementById('stmsg_'+pid);

 p.inbox=p.inbox||[];

function readInbox(){const p=curP();const m=(p.inbox||[]).find(x=>!x.read);if(m){m.read=true;save();SFX.fanfare();}render();}

/* ---- demo mode (P4-6) ---- */
function demoState(){
 const dd={version:SCHEMA_VERSION,pin:'1234',sound:S.sound,active:null,appLock:null,family:{name:'サンプル',flower:0,legacy:120},lastSeen:today(),profiles:{},order:[]};
 const demo=[['たろう','🦖','adventure','g34',{kanji:4,math:5,eigo:2,rika:2}],['はなこ','🐰','pastel','kinder',{hira:3,kazu:2,eigo:2,chie:2}]];
 demo.forEach((dp,n)=>{
  const id='demo'+n;const p=newProfile(dp[0],dp[1],dp[2],dp[3]);p.placement=false;
  for(const sk in dp[4]){if(p.subjects[sk]){p.subjects[sk].level=dp[4][sk];p.subjects[sk].placement=false;}}
  p.coins=45+n*20;p.streak=6+n;p.lastPlayed=today();
  for(let i=0;i<7;i++){const day=daysAgo(i);p.log[day]={a:8+R(10),c:6+R(6),s:{}};}
  const gk=Object.keys(p.subjects);gk.forEach((sk,j)=>{if(j<3)p.subjects[sk].miss={sample:1+R(3)};});
  // collection sample
  GACHA.slice(0,8+n*2).forEach(g=>p.collection[g.e]=1);
  dd.profiles[id]=p;dd.order.push(id);
 });
 return dd;
}

 else{V.realS=S;S=demoState();V.demo=true;V.pid=null;SFX.click();V.screen='profiles';render();}
